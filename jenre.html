<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장르 탐색</title>
    <link rel="stylesheet" href="css/font.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/jenre.css" />
  </head>

  <body>
    <header class="navbar"></header>

    <main class="page">
      <section class="hero">
        <div class="hero-inner">
          <div class="hero-head">
            <div class="hero-copy">
              <h2 class="hero-title">장르 탐색</h2>
              <p class="hero-desc">
                장르를 최대 3개까지 고르고, AND / OR 방식으로 결과를 바꿔볼 수
                있습니다.
              </p>
            </div>

            <label class="mode-switch" for="matchModeToggle">
              <input
                id="matchModeToggle"
                type="checkbox"
                aria-label="검색 방식 전환"
              />
              <span class="mode-track">
                <span class="mode-text and">AND</span>
                <span class="mode-text or">OR</span>
              </span>
            </label>
          </div>

          <div class="genre-row" id="genreRow">
            <button class="genre-btn" data-genre="comedy" type="button">
              코미디
            </button>
            <button class="genre-btn" data-genre="romance" type="button">
              로맨스
            </button>
            <button class="genre-btn" data-genre="sf" type="button">SF</button>
            <button class="genre-btn" data-genre="action" type="button">
              액션
            </button>
            <button class="genre-btn" data-genre="thriller" type="button">
              스릴러
            </button>
            <button class="genre-btn" data-genre="animation" type="button">
              애니메이션
            </button>
            <button class="genre-btn" data-genre="drama" type="button">
              드라마
            </button>
            <button class="genre-btn" data-genre="horror" type="button">
              공포
            </button>
            <button class="genre-btn" data-genre="fantasy" type="button">
              판타지
            </button>
            <button class="genre-btn" data-genre="mystery" type="button">
              미스터리
            </button>
            <button class="genre-btn" data-genre="documentary" type="button">
              다큐멘터리
            </button>
            <button class="genre-btn" data-genre="crime" type="button">
              범죄
            </button>
            <button class="genre-btn" data-genre="adventure" type="button">
              모험
            </button>
            <button class="genre-btn" data-genre="war" type="button">
              전쟁
            </button>
            <button class="genre-btn" data-genre="musical" type="button">
              뮤지컬
            </button>
          </div>
        </div>
      </section>

      <section class="content">
        <div class="grid-wrap">
          <div class="movie-grid" id="movieGrid"></div>
        </div>
      </section>
    </main>

    <script src="js/wish.js"></script>
    <script src="js/jenre.js"></script>
    <script src="js/header.js"></script>
  </body>
</html>
